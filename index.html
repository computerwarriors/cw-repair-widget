<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repair Quote — The Computer Warriors</title>

<!-- =====================================================================
  THE COMPUTER WARRIORS — REPAIR QUOTE WIDGET  (single file, no build step)

  HOW TO DEPLOY ON WORDPRESS
  --------------------------
  Option A (cleanest): host this file anywhere and iframe it:
      <iframe src="https://YOURDOMAIN/cw-repair-quote.html"
              style="width:100%;max-width:560px;height:760px;border:0"
              loading="lazy"></iframe>
  Option B: paste this whole file into a "Custom HTML" block. (Iframe is
  safer — it isolates these styles from your theme's CSS.)

  WEEKLY PRICE UPDATES
  --------------------
  Set CONFIG.priceFeedUrl to a JSON URL that your n8n job writes weekly.
  The JSON must match the PRICE_DATA shape exactly (category -> label +
  models -> repair:price). If the fetch fails, the embedded data is used,
  so the widget never goes blank. CORS-friendly hosts: raw.githubusercontent.com,
  a WP-uploaded prices.json (same origin), or an n8n webhook with CORS headers.

  SCHEDULING
  ----------
  Set CONFIG.bookingUrl to your booking page (Microsoft Bookings, RepairShopr
  appointments, Calendly, etc.). Device + repair + price are appended as query
  params so a prefill-capable booking tool can pre-populate the request.
====================================================================== -->

<!-- Apple system font renders SF on Apple devices; Inter is the cross-platform fallback -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#f5f5f7;
    --card:#ffffff;
    --ink:#1d1d1f;
    --muted:#6e6e73;
    --muted-2:#86868b;
    --line:#d2d2d7;
    --line-soft:#ececf0;
    --accent:#E86F32;          /* CTA - Orange */
    --accent-hover:#C95A22;    /* CTA - Orange Hover */
    --accent-press:#B34E1C;
    --link:#424245;            /* neutral secondary links: back + get another quote */
    --radius-card:22px;
    --radius:16px;
    --radius-row:13px;
    --font:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", system-ui, "Helvetica Neue", Arial, sans-serif;
    --shadow:0 2px 6px rgba(0,0,0,.04), 0 14px 40px rgba(0,0,0,.07);
    --shadow-tile:0 1px 2px rgba(0,0,0,.05);
    --shadow-tile-hover:0 6px 20px rgba(0,0,0,.10);
  }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    padding:28px 16px;
    display:flex;justify-content:center;
  }

  .cw{
    width:100%;max-width:500px;
    background:var(--card);
    border-radius:var(--radius-card);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  /* ---------- header ---------- */
  .cw__head{ padding:30px 30px 0; }
  .cw__title{
    font-size:24px;font-weight:600;letter-spacing:-.021em;line-height:1.12;
    margin:0;color:var(--ink);
  }
  .cw__title b{ font-weight:600;color:var(--ink); }

  /* ---------- progress (minimal ticks) ---------- */
  .cw__rail{ display:flex;gap:6px;margin-top:22px; }
  .cw__rail span{
    height:3px;flex:1;border-radius:99px;background:var(--line);
    transition:background .35s ease;
  }
  .cw__rail span.is-done{ background:var(--ink); }
  .cw__rail span.is-now{ background:var(--muted-2); }

  /* ---------- body ---------- */
  .cw__body{ padding:24px 30px 30px; }

  .cw__back{
    appearance:none;border:0;background:none;cursor:pointer;
    color:var(--link);font-family:var(--font);font-size:15px;font-weight:400;
    display:inline-flex;align-items:center;gap:3px;padding:2px 0;margin:-2px 0 18px -2px;
    transition:opacity .15s ease;
  }
  .cw__back:hover{ opacity:.65; }

  .cw__step-label{
    font-size:19px;font-weight:600;letter-spacing:-.014em;color:var(--ink);
    margin:0 0 18px;
  }

  /* ---------- category grid ---------- */
  .cw__grid{ display:grid;grid-template-columns:repeat(2,1fr);gap:12px; }
  @media(min-width:420px){ .cw__grid{grid-template-columns:repeat(3,1fr)} }

  .cw__tile{
    appearance:none;cursor:pointer;font-family:var(--font);
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:11px;
    color:var(--ink);font-size:15px;font-weight:500;letter-spacing:-.01em;
    box-shadow:var(--shadow-tile);
    transition:transform .18s cubic-bezier(.2,.7,.2,1), box-shadow .18s ease, border-color .18s ease;
  }
  .cw__tile svg{ color:var(--ink); }
  .cw__tile:hover{ transform:translateY(-2px);box-shadow:var(--shadow-tile-hover);border-color:transparent; }
  .cw__tile:active{ transform:translateY(0); }
  .cw__tile:focus-visible{ outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,111,50,.15); }

  /* ---------- rows (models + repairs) ---------- */
  .cw__list{
    display:flex;flex-direction:column;gap:8px;
    max-height:300px;overflow-y:auto;overflow-x:hidden;
    padding:3px;margin:-3px;
    scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  }
  .cw__list::-webkit-scrollbar{ width:9px; }
  .cw__list::-webkit-scrollbar-thumb{ background:var(--line);border-radius:99px;border:3px solid var(--card); }
  .cw__list::-webkit-scrollbar-thumb:hover{ background:var(--muted-2); }
  .cw__list::-webkit-scrollbar-track{ background:transparent; }
  .cw__row{
    appearance:none;cursor:pointer;font-family:var(--font);width:100%;text-align:left;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius-row);
    padding:15px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
    color:var(--ink);font-size:16px;font-weight:400;letter-spacing:-.01em;
    transition:background .15s ease, border-color .15s ease, transform .12s ease;
  }
  .cw__row:hover{ background:#fafafc;border-color:var(--muted-2); }
  .cw__row:active{ transform:scale(.995); }
  .cw__row:focus-visible{ outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(232,111,50,.15); }
  .cw__row .price{ font-weight:500;color:var(--muted);white-space:nowrap;font-size:15px; }
  .cw__row .chev{ color:var(--muted-2);flex:none; }

  /* ---------- quote reveal (signature) ---------- */
  .cw__quote{ text-align:center;padding:4px 0 0; }
  .cw__summary{ font-size:15px;color:var(--muted);margin:0;letter-spacing:-.01em; }
  .cw__summary b{ color:var(--ink);font-weight:600; }

  .cw__badge{ display:flex;flex-direction:column;align-items:center;padding:22px 0 4px; }
  .cw__badge .lbl{ font-size:13px;font-weight:500;color:var(--muted);margin-bottom:10px; }
  .cw__badge .amt{ display:inline-flex;align-items:flex-start;justify-content:center;gap:1px; }
  .cw__badge .cur{ font-size:30px;font-weight:500;color:var(--ink);margin-top:8px; }
  .cw__badge .num{ font-size:60px;font-weight:600;letter-spacing:-.03em;color:var(--ink);font-variant-numeric:tabular-nums;line-height:1; }
  .cw__badge .cents{ font-size:24px;font-weight:600;color:var(--ink);margin-top:8px;margin-left:2px; }

  .reveal{ animation:rise .5s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise{ from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* ---------- what you get ---------- */
  .cw__incl{
    font-size:15px;line-height:1.5;color:var(--ink);
    margin:16px auto 0;max-width:340px;letter-spacing:-.006em;
  }

  /* ---------- trust row ---------- */
  .cw__trust{
    display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
    margin-top:22px;padding-top:22px;border-top:1px solid var(--line-soft);
  }
  .cw__trust-item{ display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center; }
  .cw__trust-ic{ color:var(--ink);line-height:0; }
  .cw__trust-t{ font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.008em; }
  .cw__trust-s{ font-size:12px;color:var(--muted);line-height:1.35; }

  .cw__note{ font-size:12px;color:var(--muted-2);margin:20px auto 0;max-width:330px;line-height:1.5; }

  /* ---------- buttons ---------- */
  .cw__cta{
    appearance:none;cursor:pointer;font-family:var(--font);font-weight:500;
    width:100%;border:1px solid var(--accent);border-radius:999px;padding:14px 24px;font-size:17px;letter-spacing:-.01em;
    background:var(--accent);color:#fff;margin-top:24px;
    transition:background .15s ease, border-color .15s ease;
  }
  .cw__cta:hover{ background:var(--accent-hover);border-color:var(--accent-hover); }
  .cw__cta:active{ background:var(--accent-press); }
  .cw__cta:focus-visible{ outline:none;box-shadow:0 0 0 4px rgba(232,111,50,.3); }

  .cw__ghost{
    appearance:none;cursor:pointer;font-family:var(--font);font-weight:400;
    width:100%;background:none;border:0;border-radius:12px;
    padding:12px;font-size:15px;color:var(--link);margin-top:4px;
    transition:opacity .15s ease;
  }
  .cw__ghost:hover{ opacity:.65; }

  /* ---------- footer ---------- */
  .cw__foot{
    border-top:1px solid var(--line-soft);padding:16px 30px;
    font-size:12px;color:var(--muted);display:flex;gap:5px;align-items:center;justify-content:center;
    flex-wrap:wrap;text-align:center;letter-spacing:-.004em;
  }
  .cw__foot b{ color:var(--ink);font-weight:500; }
  .cw__foot:empty{ display:none; }

  /* ---------- "not sure which model?" ---------- */
  .cw__help{
    appearance:none;border:0;cursor:pointer;font-family:var(--font);
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(232,111,50,.10);color:var(--accent);
    font-size:13.5px;font-weight:600;letter-spacing:-.006em;
    padding:7px 14px 7px 7px;border-radius:999px;
    margin:-2px 0 16px;
    transition:background .15s ease;
  }
  .cw__help:hover{ background:rgba(232,111,50,.17); }
  .cw__help-q{
    flex:none;width:20px;height:20px;border-radius:999px;
    background:var(--accent);color:#fff;font-size:13px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center;
  }

  .cw__overlay{
    position:fixed;inset:0;z-index:100;
    background:rgba(0,0,0,.5);
    display:none;align-items:center;justify-content:center;padding:16px;
    opacity:0;transition:opacity .2s ease;
  }
  .cw__overlay.is-open{ display:flex;opacity:1; }
  .cw__modal{
    position:relative;width:100%;max-width:440px;max-height:92vh;overflow:auto;
    background:var(--card);border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
    transform:translateY(12px);transition:transform .25s cubic-bezier(.2,.7,.2,1);
    -webkit-overflow-scrolling:touch;
  }
  .cw__overlay.is-open .cw__modal{ transform:translateY(0); }
  .cw__modal img{ display:block;width:100%;height:auto;border-radius:20px; }
  .cw__modal-x{
    position:absolute;top:12px;right:12px;z-index:2;
    width:34px;height:34px;border-radius:999px;border:0;cursor:pointer;
    background:rgba(0,0,0,.55);color:#fff;font-size:15px;line-height:1;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s ease;
  }
  .cw__modal-x:hover{ background:rgba(0,0,0,.75); }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important}
  }
</style>
</head>

<div class="cw" id="cw" role="region" aria-label="Repair quote tool">
  <div class="cw__head">
    <h1 class="cw__title">Get a repair quote</h1>
    <div class="cw__rail" id="rail" aria-hidden="true">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="cw__body" id="view"><!-- rendered by JS --></div>

  <div class="cw__foot" id="foot"></div>
</div>

<div class="cw__overlay" id="guideOverlay" onclick="closeGuide()">
  <div class="cw__modal" onclick="event.stopPropagation()" role="dialog" aria-label="How to find your model">
    <button class="cw__modal-x" onclick="closeGuide()" aria-label="Close">✕</button>
    <img id="guideImg" alt="How to find your device model" />

<script>
/* ============================ CONFIG ============================ */
const CONFIG = {
  brand: "The Computer Warriors",
  // One URL per cadence file — ALL are fetched and merged. Empty = embedded data.
  // e.g. [ "https://.../prices-devices.json",  // written weekly
  //        "https://.../prices-consoles.json" ] // written quarterly
  priceFeedUrls: [
    "https://raw.githubusercontent.com/computerwarriors/cw-pricing-data/main/prices-devices.json",
    "https://raw.githubusercontent.com/computerwarriors/cw-pricing-data/main/prices-consoles.json"
  ],
  // Acuity scheduling page — opens in a new tab from the orange CTA.
  // device / repair / price are appended as query params (see book()).
  bookingUrl: "https://app.acuityscheduling.com/schedule.php?owner=39782661&ref=quote_widget",

  // Acuity intake field IDs (fill in after you create the fields — see setup notes).
  // Leave "" to skip that field. book() sends "field:<id>=<value>".
  acuityFields: {
    brand:  "18807792",   // Device Brand
    model:  "18807793",   // Device Model
    repair: "18807794",   // Repair Needed
    notes:  "",           // "Anything else we should know?" — intentionally left blank for the customer
    price:  "18807795"    // Quoted Price
  },
  // What the widget sends for Device Brand, by category.
  brandNames: { iphone: "Apple", ipad: "Apple", samsung: "Samsung", pixel: "Google", console: "Game Console" },
  disclaimer: "Your final quote is confirmed in-store after we inspect the device.",
  locations: ["Jacksonville", "Wilmington"],

  // GLOBAL TRUST POINTS — shown on every quote. EDIT to your real policy.
  // icon options: "shield" | "clock" | "search" | "check" | "lock"
  benefits: [
    { icon: "shield", title: "Warranty",       sub: "" }, // sub is filled per-repair from `warranty` below
    { icon: "clock",  title: "Fast turnaround", sub: "Same-day when in stock" },
    { icon: "check", title: "Quality parts", sub: "Premium components" }
  ]
};

/* "Not sure which model?" guides — image per category (upload to the repo
   next to index.html). Console has no guide (model is on the box/console). */
const GUIDES = {
  iphone:  "guide-iphone.jpg",

/* ================== OFFLINE FALLBACK (rarely used) ==================

  console: { label: "Console", models: {

    "PlayStation 4":     { "HDMI Port": 0, "Disc Drive": 0, "Overheating / Clean": 0 },
    "Xbox Series X / S": { "HDMI Port": 0, "Disc Drive": 0, "Overheating / Clean": 0 },

    "Switch OLED":       { "Screen": 0, "Charge Port": 0, "Joy-Con Drift": 0 }

};

/* category icons */
const ICONS = {
  iphone: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="6" y="2" width="12" height="20" rx="3" stroke="currentColor" stroke-width="1.6"/><line x1="10" y1="18.5" x2="14" y2="18.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',

/* small icons for the trust row */
const BENEFIT_ICONS = {
  shield:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3 4 5.5v5.6C4 16 7.4 18.8 12 20.5 16.6 18.8 20 16 20 11.1V5.5L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="m9 12 2 2 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  clock:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.5"/><path d="M12 7.5V12l3 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.5"/><line x1="16" y1="16" x2="20" y2="20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>',
  check:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.2" stroke="currentColor" stroke-width="1.5"/><path d="m8.5 12 2.3 2.3L15.5 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  lock:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5.5" y="10.5" width="13" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8.5 10.5V8a3.5 3.5 0 0 1 7 0v2.5" stroke="currentColor" stroke-width="1.5"/></svg>'

/* ===================== PER-REPAIR "WHAT YOU GET" =====================
   Keyed by repair type (keyword-matched), so you maintain one line per
   repair kind instead of one per device. EDIT freely. `fallback` covers
   anything unmatched.                                                  */
const REPAIR_INFO = {
  fallback:  "Repaired and fully tested before you pick it up.",
  match: [
    { keys:["screen","display"], text:"Premium-grade display, color-matched and touch-tested." },
    { keys:["battery"],          text:"Fresh battery restores full capacity and all-day life." },
    { keys:["charge","port"],    text:"Worn port replaced so charging — and fast charging — works reliably again." },
    { keys:["back glass"],       text:"New back glass restores the original look and finish." },
    { keys:["camera"],           text:"Camera replaced and tested so your photos and video come out sharp again." },
    { keys:["hdmi"],             text:"HDMI port rebuilt for a stable, no-flicker picture on your TV." },
    { keys:["disc","disk"],      text:"Disc drive replaced so it reads, loads, and ejects games again." },
    { keys:["hdd","hard drive"], text:"New drive installed so games and saves load quickly again." },
    { keys:["psu","power"],      text:"Power supply replaced so it powers on and stays on reliably." },
    { keys:["overheat","clean"], text:"Deep-cleaned and re-pasted so it runs cooler and quieter under load." },
    { keys:["joy","drift"],      text:"Stick drift fixed so your controls track accurately again." }
  ]
};
function repairInfo(repair){
  const r = String(repair).toLowerCase();
  const hit = REPAIR_INFO.match.find(m => m.keys.some(k => r.includes(k)));
  return hit ? hit.text : REPAIR_INFO.fallback;
}

/* the feed stores each repair as { price, warranty }; read it safely
   (still works if a value is ever a plain number). */
function priceOf(entry){ return (entry && typeof entry === "object") ? entry.price : entry; }
function warrantyOf(entry){ return (entry && typeof entry === "object") ? (entry.warranty || "") : ""; }

/* warranty meta (jsonld) pulled from the feed at load time */
let META = FALLBACK_META;

/* warranty perk lines (edit here to change wording everywhere) */
const SCREEN_PERK   = "Covered for life against defects — and if it cracks again within 12 months, we'll repair it once for free.";
const LIFETIME_PERK = "Covered for life against defects.";
const YEAR_PERK     = "Backed by our 1-year warranty.";

/* the perk matches the repair's ACTUAL warranty tier (from the feed),
   so a console screen gets the 1-year line, not the lifetime one. */
function warrantyPerk(repair, warranty){
  const w = String(warranty || "");
  if(/lifetime/i.test(w)) return /screen/i.test(repair) ? SCREEN_PERK : LIFETIME_PERK;
  if(/year/i.test(w)) return YEAR_PERK;
  return "";
}

/* "what you get" line = feature sentence + its warranty perk */
function inclLine(repair, warranty){
  const feature = repairInfo(repair);
  const perk = warrantyPerk(repair, warranty);
  return perk ? feature + " " + perk : feature;
}

/* turnaround chip text — iPads & consoles run longer than phones */
function turnaroundFor(category){
  return (category === "ipad" || category === "console") ? "2–3 day turnaround" : "Same-day when in stock";
}

/* ============================ STATE ============================ */
let DATA = PRICE_DATA;
const state = { step: 0, category: null, model: null, repair: null };

const view  = document.getElementById('view');
const rail  = document.getElementById('rail');
const foot  = document.getElementById('foot');

const money = n => "$" + Number(n).toLocaleString("en-US");
const chevron = '<svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m9 6 6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const backArrow = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m15 6-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

/* ============================ RENDER ============================ */
function setRail(){
  [...rail.children].forEach((s,i)=>{
    s.className = i < state.step ? "is-done" : (i === state.step ? "is-now" : "");
  });
}

function backBtn(label){
  return `<button class="cw__back" onclick="goBack()">${backArrow}${label}</button>`;
}

function render(){
  setRail();
  if(state.step === 0) return renderCategories();
  if(state.step === 1) return renderModels();
  if(state.step === 2) return renderRepairs();
  if(state.step === 3) return renderQuote();
}

function renderCategories(){
  const tiles = Object.entries(DATA).filter(([key])=>!key.startsWith("_")).map(([key,cat])=>`
    <button class="cw__tile" onclick="pickCategory('${key}')">
      ${ICONS[key] || ICONS.iphone}
      <span>${cat.label}</span>
    </button>`).join("");
  view.innerHTML = `
    <p class="cw__step-label">What needs fixing?</p>
    <div class="cw__grid">${tiles}</div>`;
}

function renderModels(){
  const cat = DATA[state.category];
  const rows = Object.keys(cat.models).map(m=>`
    <button class="cw__row" onclick="pickModel('${esc(m)}')">
      <span>${m}</span>${chevron}
    </button>`).join("");
  const help = GUIDES[state.category]
    ? `<button class="cw__help" onclick="openGuide()"><span class="cw__help-q">?</span><span>Not sure which model? Tap here</span></button>`
    : ``;
  view.innerHTML = `
    ${backBtn("Devices")}
    <p class="cw__step-label">Pick your ${cat.label}</p>
    ${help}
    <div class="cw__list">${rows}</div>`;
}

function renderRepairs(){
  const repairs = DATA[state.category].models[state.model];
  const rows = Object.keys(repairs).map(r=>`
    <button class="cw__row" onclick="pickRepair('${esc(r)}')">
      <span>${r}</span>${chevron}
    </button>`).join("");
  view.innerHTML = `
    ${backBtn(DATA[state.category].label)}
    <p class="cw__step-label">${state.model} — what's the issue?</p>
    <div class="cw__list">${rows}</div>`;
}

function renderQuote(){
  const entry = DATA[state.category].models[state.model][state.repair];
  const price = priceOf(entry);
  const hasPrice = price > 0;
  const trust = CONFIG.benefits.map(b=>{
    // fill Warranty from the feed, and Fast turnaround by device category
    let sub = b.sub;
    if(b.title === "Warranty" && !b.sub) sub = warrantyOf(entry);
    else if(b.title === "Fast turnaround") sub = turnaroundFor(state.category);
    return `
    <div class="cw__trust-item">
      <span class="cw__trust-ic">${BENEFIT_ICONS[b.icon] || BENEFIT_ICONS.check}</span>
      <span class="cw__trust-t">${b.title}</span>
      <span class="cw__trust-s">${sub}</span>
    </div>`;
  }).join("");
  view.innerHTML = `
    ${backBtn("Repairs")}
    <div class="cw__quote">
      <p class="cw__summary"><b>${state.repair}</b> for your <b>${state.model}</b></p>
      ${hasPrice ? `
        <div class="cw__badge reveal">
          <span class="lbl">Estimated total</span>
          <span class="amt">
            <span class="cur">$</span><span class="num">${Math.floor(price).toLocaleString("en-US")}</span>${(Math.round((price % 1) * 100)) ? `<span class="cents">${String(Math.round((price % 1) * 100)).padStart(2,"0")}</span>` : ``}
          </span>
        </div>` : `
        <div class="cw__badge reveal">
          <span class="lbl">Estimate</span>
          <span class="amt"><span class="num" style="font-size:28px">Custom quote</span></span>
        </div>`}

      <p class="cw__incl">${inclLine(state.repair, warrantyOf(entry))}</p>

      <div class="cw__trust">${trust}</div>

      <p class="cw__note">${CONFIG.disclaimer}</p>
      <button class="cw__cta" onclick="book()">Book your visit</button>
      <button class="cw__ghost" onclick="reset()">Get another quote</button>
    </div>`;
  if(hasPrice) animatePrice(Math.floor(price));
}

/* quick, tasteful count-up on the dollars (reduced-motion shows final) */
function animatePrice(target){
  const el = view.querySelector(".cw__badge .num");
  if(!el) return;
  const fmt = n => Math.round(n).toLocaleString("en-US");
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(reduce || target < 30){ el.textContent = fmt(target); return; }
  const dur = 460, start = performance.now(), ease = t => 1 - Math.pow(1 - t, 3);
  (function tick(now){
    const p = Math.min(1, (now - start) / dur);
    el.textContent = fmt(target * ease(p));
    if(p < 1) requestAnimationFrame(tick); else el.textContent = fmt(target);
  })(performance.now());
}

/* ============================ ACTIONS ============================ */
function pickCategory(k){ state.category = k; state.step = 1; render(); }
function pickModel(m){ state.model = m; state.step = 2; render(); }
function pickRepair(r){ state.repair = r; state.step = 3; render(); }
function goBack(){ if(state.step>0){ state.step--; render(); } }
function reset(){ state.step=0; state.category=state.model=state.repair=null; render(); }

function book(){
  const price = priceOf(DATA[state.category].models[state.model][state.repair]);
  const f = CONFIG.acuityFields || {};
  const brand = (CONFIG.brandNames && CONFIG.brandNames[state.category]) || DATA[state.category].label;
  const parts = [];
  // build manually so "field:ID" keys aren't mangled; encode values only
  const add = (k,v)=> parts.push(k + "=" + encodeURIComponent(v));
  if(f.brand)  add("field:" + f.brand,  brand);
  if(f.model)  add("field:" + f.model,  state.model);
  if(f.repair) add("field:" + f.repair, state.repair);
  if(f.notes)  add("field:" + f.notes,  "Online quote: " + state.model + " \u00B7 " + state.repair + (price > 0 ? " \u00B7 ~$" + price : ""));
  if(f.price && price > 0) add("field:" + f.price, "$" + price);
  if(!parts.length){ // no field IDs configured yet — keep light tracking params
    add("device", state.model); add("repair", state.repair); if(price > 0) add("price", price);
  }
  const sep = CONFIG.bookingUrl.indexOf("?") !== -1 ? "&" : "?";
  window.open(CONFIG.bookingUrl + sep + parts.join("&"), "_blank", "noopener");
}

/* basic escaping for values placed inside onclick='...' */
function esc(s){ return String(s).replace(/'/g,"\\'"); }

/* "Not sure which model?" guide overlay */
function openGuide(){
  const file = GUIDES[state.category];
  if(!file) return;
  const img = document.getElementById("guideImg");
  if(img.getAttribute("src") !== file) img.setAttribute("src", file); // lazy-load on first open
  document.getElementById("guideOverlay").classList.add("is-open");
}
function closeGuide(){
  document.getElementById("guideOverlay").classList.remove("is-open");
}
document.addEventListener("keydown", e => { if(e.key === "Escape") closeGuide(); });

/* ============================ INIT ============================ */
function renderFoot(){
  foot.innerHTML = ``;
}

async function loadPrices(){
  const urls = CONFIG.priceFeedUrls || [];
  if(!urls.length){ render(); return; }
  const merged = {};
  await Promise.all(urls.map(async url=>{
    try{
      const res = await fetch(url, {cache:"no-store"});
      if(!res.ok) throw new Error("feed " + res.status);
      const json = await res.json();
      if(json && typeof json === "object") Object.assign(merged, json);
    }catch(e){
      console.warn("Feed unavailable:", url, e);
    }
  }));
  // use merged feeds if we got anything; otherwise keep the fallback
  if(Object.keys(merged).length){
    if(merged._warranty) META = merged._warranty;
    delete merged._warranty;
    delete merged._generated;
    DATA = merged;
  }
  render();
}

renderFoot();
loadPrices();
</script>
